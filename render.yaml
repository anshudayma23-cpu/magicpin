services:
  - type: web
    name: vera-merchant-ai
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn bot:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /v1/healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: GROQ_API_KEYS
        sync: false
      - key: GEMINI_API_KEY
        sync: false
